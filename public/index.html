<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Topdown Garden Online</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="panel">
        <h1>Topdown Garden Online</h1>
        <label for="nameInput">Name</label>
        <input id="nameInput" maxlength="16" placeholder="Enter username" />
        <button id="setNameBtn">Set Name</button>

        <div id="message" class="message"></div>
        <div id="stats" class="stats"></div>
        <div id="inventorySummary" class="inventory"></div>
        <div id="selectedSeed" class="seed"></div>
        <div id="growthTimers" class="timers"></div>

        <h2>Controls</h2>
        <ul>
          <li>Move: WASD or Arrow Keys</li>
          <li>Sprint: Hold Shift (uses stamina)</li>
          <li>Find chest in forest: G</li>
          <li>Plant on farm tile: E</li>
          <li>Harvest ready crop: F</li>
          <li>Select seed: 1 (carrot), 2 (pumpkin)</li>
          <li>Inventory grid: I</li>
        </ul>
      </aside>

      <main>
        <div class="hud-top">
          <div class="bar-wrap">
            <div class="bar-label">Health</div>
            <div class="bar"><div id="healthFill" class="fill health"></div></div>
          </div>
          <div class="bar-wrap">
            <div class="bar-label">Stamina</div>
            <div class="bar"><div id="staminaFill" class="fill stamina"></div></div>
          </div>
        </div>
        <canvas id="game" width="1200" height="800"></canvas>
      </main>
    </div>

    <div id="inventoryModal" class="inventory-modal hidden">
      <div class="inventory-window">
        <div class="inventory-title">Inventory</div>
        <div id="inventoryGrid" class="inventory-grid"></div>
      </div>
    </div>

    <script src="/game.js"></script>
  </body>
</html>
