<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Topdown Garden Online</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="panel">
        <h1>Topdown Garden Online</h1>
        <label for="nameInput">Name</label>
        <input id="nameInput" maxlength="16" placeholder="Your farmer name" />
        <button id="setNameBtn">Set Name</button>

        <div class="stats" id="stats"></div>

        <h2>Controls</h2>
        <ul>
          <li>Move: WASD or Arrow Keys</li>
          <li>Plant: E (on your tile)</li>
          <li>Harvest: F (when crop is ready)</li>
        </ul>

        <h2>Goal</h2>
        <p>Plant carrots, wait for growth, harvest for money, and farm with others live.</p>
      </aside>

      <main>
        <canvas id="game" width="832" height="576"></canvas>
      </main>
    </div>

    <script src="/game.js"></script>
  </body>
</html>
