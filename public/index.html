<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Topdown Garden Online</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="panel">
        <h1>Topdown Garden Online</h1>
        <label for="nameInput">Name</label>
        <input id="nameInput" maxlength="32" placeholder="Name or ((admin) yourname" />
        <button id="setNameBtn">Set Name</button>

        <div class="message" id="message"></div>
        <div class="stats" id="stats"></div>

        <section id="adminPanel" class="admin hidden">
          <h2>Admin Panel</h2>
          <button id="clearPlotsBtn">Clear All Crops</button>
          <div id="adminPlayers" class="admin-list"></div>
        </section>

        <h2>Controls</h2>
        <ul>
          <li>Move: WASD or Arrow Keys</li>
          <li>Plant: E (on your tile)</li>
          <li>Harvest: F (when crop is ready)</li>
        </ul>
      </aside>

      <main>
        <canvas id="game" width="832" height="576"></canvas>
      </main>
    </div>

    <script src="/game.js"></script>
  </body>
</html>
