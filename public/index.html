<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Topdown Garden Online</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="panel">
        <h1>Topdown Garden Online</h1>
        <label for="nameInput">Name</label>
        <input id="nameInput" maxlength="16" placeholder="Enter username" />
        <button id="setNameBtn">Set Name</button>

        <div id="message" class="message"></div>
        <div id="stats" class="stats"></div>
        <div id="inventory" class="inventory"></div>
        <div id="selectedSeed" class="seed"></div>
        <div id="growthTimers" class="timers"></div>

        <h2>Controls</h2>
        <ul>
          <li>Move: WASD or Arrow Keys</li>
          <li>Find treasure in forest: G</li>
          <li>Plant on your farm tile: E</li>
          <li>Harvest ready crop: F</li>
          <li>Select seed: 1 (carrot), 2 (pumpkin)</li>
        </ul>
      </aside>

      <main>
        <canvas id="game" width="1200" height="800"></canvas>
      </main>
    </div>

    <script src="/game.js"></script>
  </body>
</html>
